.btn {

/* 뒤로 버튼 */

/* 시작 버튼 */

}

/* 눌렀을 때 효과 */

/* ================= 기본 설정 ================= */
const MAX = 3;
let selected = [];

const allSongs = [
  "여름밤에 우리 | 전진희(feat. wave to earth)",
  "한숨 | 이하이",
  "0+0 | 한로로"
];

const songList = document.getElementById("songList");
const countText = document.getElementById("count");
const micBtn = document.getElementById("micBtn");
const reserveScreen = document.getElementById("reserveScreen");
const reserveList = document.getElementById("reserveList");
const audio = document.getElementById("audio");

/* ================= 🎵 노래 목록 (백엔드 구조 맞춤) ================= */
async function filterSongs() {
  const keyword = document.getElementById("searchInput").value.trim();
  const songList = document.getElementById("songList");

  if (keyword === "") {
    songList.innerHTML = "";
    return;
  }

  try {
    const response = await axios.get(`http://127.0.0.1:8000/library/search?keyword=${keyword}`);
    
    // [수정 포인트] 백엔드가 {"count": n, "results": [...]} 로 주므로 results를 가져와야 함
    const songsFromDB = response.data.results; 

    songList.innerHTML = ""; 

    if (!songsFromDB || songsFromDB.length === 0) {
        songList.innerHTML = "<div class='song'>검색 결과가 없습니다.</div>";
        return;
    }

    songsFromDB.forEach(song => {
      const div = document.createElement("div");
      div.className = "song";
      
      const songName = `${song.title} | ${song.singer}`;
      div.innerText = songName;

      div.onclick = () => {
        if (selected.length >= MAX) return alert("곡 선택이 완료되었습니다.");
        if (selected.includes(songName)) return alert("이미 선택된 곡입니다.");

        if (!songData[songName]) {
            alert("음원 데이터가 없는 곡입니다.");
            return;
        }

        if (confirm(`'${songName}'을 예약하시겠습니까?`)) {
          selected.push(songName);
          
          // [수정] 쿼리 파라미터(params) 방식으로 예약 데이터 전송
          axios.post('http://127.0.0.1:8000/library/reserve', null, {
            params: {
              booth_id: 1,
              tj_number: song.tj_number
            }
          })
          .then(res => {
            console.log("예약 성공:", res.data);
          })
          .catch(err => {
            console.error("예약 실패:", err.response?.data || err.message);
          });

          updateUI();
        }
      };
      songList.appendChild(div);
    });
  } catch (error) {
    console.error("검색 실패:", error);
  }
}

/* ================= UI ================= */
function updateUI() {
  countText.innerText = `(${selected.length} / ${MAX}곡)`;
  if (selected.length === MAX) micBtn.style.display = "block";
}

micBtn.onclick = () => {
  reserveList.innerHTML = "";
  selected.forEach(s => {
    const div = document.createElement("div");
    div.className = "reserve-item";
    div.innerText = s;
    reserveList.appendChild(div);
  });
  reserveScreen.style.display = "block";
};

function closeReserve() {
  reserveScreen.style.display = "none";
}
function startSong() {
  if (selected.length === 0) {
    alert("노래를 먼저 예약해주세요!");
    return;
  }

  currentIndex = 0;
  reserveScreen.style.display = "none";
  playSong(currentIndex);
}


/* ================= 🎶 노래 재생 ================= */
function playSong(index) {
  const songName = selected[index];
  const data = songData[songName];

  if (!data) {
    alert("아직 준비되지 않은 노래예요!");
    return;
  }

  document.getElementById("playScreen").style.display = "block";
  document.getElementById("songTitle").innerText = songName;

  const countdownEl = document.getElementById("countdown");
  const lyricsBox = document.getElementById("lyrics");

  countdownEl.innerText = "";   // 카운트 영역 비우기
  lyricsBox.innerText = "";

  // ▶ 바로 재생
  audio.src = data.audio;
  audio.play();

  // 🎵 가사 싱크
  audio.ontimeupdate = () => {
    const current = audio.currentTime;
    for (let i = data.lyrics.length - 1; i >= 0; i--) {
      if (current >= data.lyrics[i].time) {
        lyricsBox.innerText = data.lyrics[i].text;
        break;
      }
    }
  };

  // 🎶 곡 끝나면 다음 곡 대기
  audio.onended = () => {
    showNextCountdown();
  };
}


function showNextCountdown() {
  const countdownEl = document.getElementById("countdown");
  const lyricsBox = document.getElementById("lyrics");

  // 🔥 마지막 곡이면 바로 종료 메시지
  if (currentIndex >= selected.length - 1) {
    lyricsBox.innerText = "";
    countdownEl.innerText = "사용자의 노래를 분석 중입니다.";
    return;
  }

  // 아직 다음 곡이 남아있을 때만 10초 카운트
  let wait = 10;
  lyricsBox.innerText = "";
  countdownEl.innerText = `다음 곡 재생까지 ${wait}초`;

  const waitTimer = setInterval(() => {
    wait--;

    if (wait === 0) {
      clearInterval(waitTimer);
      currentIndex++;
      playSong(currentIndex);
    } else {
      countdownEl.innerText = `다음 곡 재생까지 ${wait}초`;
    }
  }, 1000);
}
