<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SingPick</title>

<style>
* {
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  margin: 0;
  background: #fafafa;
}

.page {
  display: none;
  padding-bottom: 70px;
}

.page.active {
  display: block;
}

header {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  background: #fafafa;
  text-align: center;
  line-height: 70px;
  font-size: 28px;
  font-weight: bold;
  z-index: 10;
  border-bottom: 1px solid #ddd;
}


.line {
  display: none;
}

.content {
  padding: 20px;
  padding-top: 90px;
}

.box {
  background: white;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 15px;
  min-height: 100px;
  box-shadow: 0 0 6px rgba(0,0,0,0.05);
}

/* 하단 네비게이션 */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 60px;
  background: white;
  border-top: 1px solid #ddd;
  display: flex;
}

.nav button {
  flex: 1;
  border: none;
  background: none;
  font-size: 16px;
}

.nav button.active {
  color: #ff4d6d;
  font-weight: bold;
  border-top: 3px solid #ff4d6d;
}

/* ================= 📊 깔끔한 막대 그래프 스타일 ================= */
.graph-container {
  display: flex;
  flex-direction: column;
  gap: 12px; /* 항목 간 간격 */
  margin-top: 15px;
}

.graph-item {
  display: flex;
  align-items: center;
  justify-content: space-between; /* 이름과 점수를 양끝으로 */
}

.graph-label {
  font-size: 16px;
  font-weight: bold;
  color: #555;
  width: 50px; /* 라벨 너비 고정 */
}

/* 그래프 총 길이 (회색 배경) */
.bar-background {
  flex-grow: 1; /* 남은 공간 꽉 채우기 */
  height: 12px;
  background-color: #e0e0e0;
  border-radius: 6px;
  margin: 0 15px; /* 라벨과 점수 사이 간격 */
  overflow: hidden; /* 넘치는 막대 숨기기 */
  position: relative;
}

/* 실제 점수 막대 (색상 배경) */
.bar-fill {
  height: 100%;
  background-color: #ddd; /* 기본 색상 */
  border-radius: 6px;
  width: 0%; /* 처음엔 0% */
  transition: width 0.8s ease-out, background-color 0.5s ease; /* 부드러운 애니메이션 */
}

.graph-score {
  font-size: 18px;
  font-weight: bold;
  color: #333;
  width: 50px; /* 점수 너비 고정 */
  text-align: right;
}

</style>
</head>

<body>

<!-- 홈 화면 -->
<div id="home" class="page active">
  <header>SING PICK</header>
  <div class="line"></div>

 <div class="content">

  <!-- 곡 추천 -->
  <div class="box">
    <strong>🎶 곡 추천</strong>
    <p id="song">추천 가수/곡 표시 예정</p>
  </div>

  <!-- 사용자 분석 피드백 -->
  <div class="box">
    <strong>🎤 사용자 분석 피드백</strong>
    <p id="feedback">분석된 피드백 표시 예정</p>
  </div>

  <!-- 음성 분석 그래프 -->
  <div class="box">
    <strong>📊 내 음성 그래프</strong>
    <p id="graph">음정, 음색, 음역대 등의 그래프 표시 예정</p>
  </div>

</div>
</div>

<!-- 마이페이지 -->
<div id="mypage" class="page">
  <header>SING PICK</header>
  <div class="line"></div>

  <div class="content">
  <div style="font-size:20px; font-weight:bold; margin-bottom:10px;">
    USER_ID
  </div>
  <div style="border-top:1px solid #ddd; margin-bottom:20px;"></div>
  <div class="box">
    <strong>My 'Sing Pick'</strong>
    <p id="history">누적 피드백 기록 표시 예정</p>
  </div>
  </div>
</div>


<!-- 네비게이션 -->
<div class="nav">
  <button id="nav-home" onclick="showPage('home')">Home</button>
  <button id="nav-mypage" onclick="showPage('mypage')">My Page</button>
</div>

<input type="file" id="audioFile" accept="audio/wav">
<button onclick="uploadAndAnalyze()">분석 시작하기</button>

<script>
function showPage(page) {
  // 페이지 전환
  document.querySelectorAll(".page").forEach(p => {
    p.classList.remove("active");
  });
  document.getElementById(page).classList.add("active");

  // 네비게이션 상태 초기화
  document.querySelectorAll(".nav button").forEach(b => {
    b.classList.remove("active");
  });

  // 현재 페이지에 맞는 버튼 강조
  if (page === "home") {
    document.getElementById("nav-home").classList.add("active");
  } else if (page === "mypage") {
    document.getElementById("nav-mypage").classList.add("active");
  }
}

async function uploadAndAnalyze() {
    const fileInput = document.getElementById('audioFile');
    if (!fileInput.files[0]) {
        alert("녹음 파일을 선택해주세요!");
        return;
    }

    // 1. API에 맞게 폼 데이터 묶기
    const formData = new FormData();
    formData.append("file", fileInput.files[0]);
    formData.append("reservation_id", 1); // 임시 ID
    formData.append("reference_song", "No_Doubt"); 
    
    // 로딩 중 표시 (옵션)
    document.getElementById("feedback").innerText = "AI가 분석 중입니다... 잠시만 기다려주세요!";

    try {
        // 2. 원영님의 로컬 서버로 요청 보내기!
        const response = await fetch("http://127.0.0.1:8000/songs/upload", {
            method: "POST",
            body: formData
        });
        
        const result = await response.json();

        if (result.status === "success") {
            document.getElementById("song").innerText = result.data.recommendations; 
            document.getElementById("feedback").innerText = result.data.feedback;
            
            // 🚨 [핵심] 점수 데이터를 막대 그래프로 시각화!
            const scores = result.data.scores;
            const graphBox = document.getElementById("graph");
            
            // 그래프 HTML 구조 생성
            graphBox.innerHTML = `
                <div class="graph-container">
                    ${createBarGraph("음정", scores.pitch)}
                    ${createBarGraph("박자", scores.tempo)}
                    ${createBarGraph("성량", scores.volume)}
                </div>
            `;

            // HTML이 그려진 후, 약간의 시차를 두고 애니메이션 실행!
            setTimeout(() => {
                animateBar("pitch-bar", scores.pitch);
                animateBar("tempo-bar", scores.tempo);
                animateBar("volume-bar", scores.volume);
            }, 100);

        } else {
            alert("분석 실패: " + result.message);
        }
    } catch (error) {
        console.error("서버 통신 에러:", error);
        alert("서버와 연결할 수 없습니다.");
    }
}

function createBarGraph(label, score) {
    const barId = label === "음정" ? "pitch-bar" : (label === "박자" ? "tempo-bar" : "volume-bar");
    return `
        <div class="graph-item">
            <span class="graph-label">${label}</span>
            <div class="bar-background">
                <div id="${barId}" class="bar-fill"></div>
            </div>
            <span class="graph-score">${score}점</span>
        </div>
    `;
}

function animateBar(barId, score) {
    const bar = document.getElementById(barId);
    if(!bar) return; // 혹시 몰라 안전장치 추가!
    
    bar.style.width = `${score}%`;

    if (score >= 90) {
        bar.style.backgroundColor = "#2F80ED";
    } else if (score >= 70) {
        bar.style.backgroundColor = "#27AE60";
    } else if (score >= 50) {
        bar.style.backgroundColor = "#F2C94C";
    } else {
        bar.style.backgroundColor = "#EB5757";
    }
}

window.addEventListener('DOMContentLoaded', async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user_id');

    if (userId) {
        document.getElementById("feedback").innerText = `${userId}님의 목소리를 분석 중입니다... 🎙️`;
        
        // 여기에 나중에 "최근 분석 결과 가져오기" API를 연결하면 
        // 버튼 안 눌러도 자동으로 촥! 뜹니다.
        // 지금은 일단 수동 버튼이 있으니 연결 고리만 확인하세요!
    }
});

// 페이지 처음 열릴 때 홈으로 세팅
showPage("home");
</script>



</body>
</html>
