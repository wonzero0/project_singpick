<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sing Pick Booth</title>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<style>
/* ================= CSS 스타일 ================= */
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
}

.top-bar {
  height: 70px;
  background: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 20px;
  font-size: 20px;
  border-bottom: 1px solid #ddd;
  font-weight: bold;
}

.logo {
  font-family: 'Montserrat', 'Pretendard', sans-serif;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-weight: 700;
  font-size: 30px;
  letter-spacing: 0.5px;
}

.right {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 20px;
}

.search {
  margin: 15px;
  padding: 15px;
  font-size: 18px;
  width: calc(100% - 30px);
  border: 1px solid #ccc;
  border-radius: 8px;
}

.song-list {
  height: calc(100vh - 170px);
  overflow-y: auto;
  padding: 0 15px;
}

.song {
  background: white;
  padding: 20px;
  margin-bottom: 10px;
  border-radius: 12px;
  font-size: 20px;
  cursor: pointer;
  border: 1px solid #eee;
  transition: 0.2s;
}
.song:hover {
  background: #f0f8ff;
}

.mic {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 80px;
  border-radius: 50%;
  font-size: 32px;
  background: #ff0000;
  color: white;
  border: none;
  display: none;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  padding: 20px;
  display: none;
  z-index: 100;
}
.overlay h2 { margin-top: 0; }

.reserve-item {
  padding: 15px;
  background: #f1f1f1;
  margin-bottom: 10px;
  border-radius: 10px;
  font-size: 18px;
}

/* 예약 버튼 영역 */
.reserve-buttons {
  position: fixed;
  bottom: 30px;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  gap: 20px;
  padding: 0 20px;
  box-sizing: border-box;
}

.btn {
  width: 45%;
  padding: 18px 0;
  font-size: 22px;
  border-radius: 14px;
  border: none;
  font-weight: bold;
  transition: all 0.15s ease;
  cursor: pointer;
}
.btn.back { background: #ddd; color: #333; }
.btn.start { background: #ff4d6d; color: white; }
.btn:active { transform: scale(0.96); filter: brightness(0.9); }
</style>
</head>

<body>
<div id="main">
  <div class="top-bar">
    <div style="font-size: 18px; color: #333; display: flex; align-items: center;">
      👤 <span id="display-user" style="font-weight: bold; margin-left: 5px;">Guest</span>님
    </div>
    
    <div class="logo">SINGPICK</div>
    
    <div class="right" style="display: flex; gap: 15px;">
      <span style="font-size: 16px; color: #2F80ED; font-weight: bold;">
        🎵 남은 곡: <span id="display-songs">0</span>
      </span>
      <span style="font-size: 16px; color: #EB5757; font-weight: bold;">
        🎤 예약됨: <span id="reserved-songs-count">0</span>
      </span>
    </div>
  </div>

  <input class="search" id="searchInput" placeholder="노래 제목 또는 가수 검색" oninput="filterSongs()">
  <div class="song-list" id="songList"></div>
</div>

<button class="mic" id="micBtn">🎤</button>

<div class="overlay" id="reserveScreen">
  <h2>예약한 곡</h2>
  <div id="reserveList"></div>
  <div class="reserve-buttons">
    <button class="btn back" onclick="closeReserve()">뒤로</button>
    <button class="btn start" onclick="startSong()">시작</button>
  </div>
</div>

<div id="playScreen" class="overlay" style="display:none; text-align:center;">
  <h1 id="songTitle"></h1>
  <div id="countdown" style="font-size:40px; margin-top:40px;"></div>
  <div id="lyrics" style="font-size:32px; margin-top:60px; font-weight:bold;">가사 표시</div>
</div>

<audio id="audio"></audio>

<script>
// ================= 자바스크립트 로직 =================
let currentIndex = 0;
let currentSong = null;
let selected = []; // 예약된 노래 목록

// 🎵 하드코딩된 노래 데이터 (유지)
const songData = {
  "0+0 | 한로로": {
    audio: "0+0.m4a",
    lyrics: [ { time: 12, text: "3" }, { time: 13, text: "2" }, { time: 14, text: "1" }, { time: 15, text: "검은 눈동자의 사각지대를 찾으러 가자" } ]
  }, 
  "한숨 | 이하이": {
    audio: "여름밤에 우리.m4a",
    lyrics: [ { time: 14, text: "3" }, { time: 32, text: "숨을 크게 쉬어봐요" } ]
  },
  "여름밤에 우리 | 전진희(feat. wave to earth)": {
    audio: "여름밤에 우리.m4a",
    lyrics: [ { time: 15, text: "3" }, { time: 18, text: "오랜만에 너를 만나 얘길 나누니" } ]
  }
};

const songList = document.getElementById("songList");
const micBtn = document.getElementById("micBtn");
const reserveScreen = document.getElementById("reserveScreen");
const reserveList = document.getElementById("reserveList");
const audio = document.getElementById("audio");

/* ================= 🎵 노래 검색 및 예약 로직 ================= */
async function filterSongs() {
  const keyword = document.getElementById("searchInput").value.trim();
  const songList = document.getElementById("songList");

  try {
    const response = await axios.get(`http://127.0.0.1:8000/library/search?keyword=${keyword}`);
    const songsFromDB = response.data.results; 

    songList.innerHTML = ""; 

    if (!songsFromDB || songsFromDB.length === 0) {
        songList.innerHTML = "<div class='song' style='text-align:center; color:gray;'>검색 결과가 없습니다.</div>";
        return;
    }

    songsFromDB.forEach(song => {
      const div = document.createElement("div");
      div.className = "song";
      
      const songName = `${song.title} | ${song.singer}`;
      div.innerHTML = `<strong>${song.title}</strong> - ${song.singer} <span style="font-size:14px; color:gray;">(TJ: ${song.tj_number})</span>`;

      // 🚨 여기가 핵심! 노래를 클릭했을 때 예약되는 로직
      div.onclick = () => {
        let remainSongs = parseInt(localStorage.getItem("remain_songs") || "0");

        if (remainSongs <= 0) return alert("남은 곡이 없습니다! 추가 결제 후 이용해주세요.");
        if (selected.includes(songName)) return alert("이미 예약된 곡입니다.");

        if (confirm(`'${songName}'을 예약하시겠습니까?`)) {
          // 1. 남은 곡 수 차감
          remainSongs -= 1;
          localStorage.setItem("remain_songs", remainSongs);
          
          // 2. 예약 목록에 추가
          selected.push(songName);
          
          // 3. 백엔드 전송
          axios.post('http://127.0.0.1:8000/library/reserve', null, {
            params: { booth_id: 1, tj_number: song.tj_number }
          })
          .then(res => console.log("서버 예약 성공:", res.data))
          .catch(err => console.error("서버 예약 실패:", err));

          // 4. 화면 숫자 업데이트
          updateUI();
        }
      };
      songList.appendChild(div);
    });
  } catch (error) {
    console.error("검색 실패:", error);
  }
}

/* ================= 🔄 화면(UI) 숫자 업데이트 ================= */
function updateUI() {
  const remainSongs = parseInt(localStorage.getItem("remain_songs") || "0");
  const reservedSongs = selected.length;

  document.getElementById("display-songs").innerText = remainSongs;
  document.getElementById("reserved-songs-count").innerText = reservedSongs;

  // 🚨 1번 요청: 남은 곡이 0이 되어야만(결제한 곡을 다 예약해야만) 마이크 버튼 표시!
  if (remainSongs <= 0 && reservedSongs > 0) {
    micBtn.style.display = "block";
  } else {
    micBtn.style.display = "none";
  }
}

/* ================= 🎤 마이크 버튼 및 예약 확인 창 ================= */
micBtn.onclick = () => {
  reserveList.innerHTML = "";
  selected.forEach(s => {
    const div = document.createElement("div");
    div.className = "reserve-item";
    div.innerText = s;
    reserveList.appendChild(div);
  });
  reserveScreen.style.display = "block";
};

function closeReserve() { reserveScreen.style.display = "none"; }

function startSong() {
  if (selected.length === 0) return alert("노래를 먼저 예약해주세요!");
  currentIndex = 0;
  reserveScreen.style.display = "none";
  playSong(currentIndex);
}

/* ================= 🎶 노래 재생 ================= */
function playSong(index) {
  const songName = selected[index];
  const data = songData[songName];

  if (!data) return alert("아직 준비되지 않은 노래예요!");

  document.getElementById("playScreen").style.display = "block";
  document.getElementById("songTitle").innerText = songName;

  const countdownEl = document.getElementById("countdown");
  const lyricsBox = document.getElementById("lyrics");

  countdownEl.innerText = "";  
  lyricsBox.innerText = "";

  audio.src = data.audio;
  audio.play();

  audio.ontimeupdate = () => {
    const current = audio.currentTime;
    for (let i = data.lyrics.length - 1; i >= 0; i--) {
      if (current >= data.lyrics[i].time) {
        lyricsBox.innerText = data.lyrics[i].text;
        break;
      }
    }
  };

  audio.onended = () => { showNextCountdown(); };
}

function showNextCountdown() {
  const countdownEl = document.getElementById("countdown");
  const lyricsBox = document.getElementById("lyrics");

  if (currentIndex >= selected.length - 1) {
    lyricsBox.innerText = "";
    countdownEl.innerText = "사용자의 노래를 분석 중입니다.";
    return;
  }

  let wait = 10;
  lyricsBox.innerText = "";
  countdownEl.innerText = `다음 곡 재생까지 ${wait}초`;

  const waitTimer = setInterval(() => {
    wait--;
    if (wait === 0) {
      clearInterval(waitTimer);
      currentIndex++;
      playSong(currentIndex);
    } else {
      countdownEl.innerText = `다음 곡 재생까지 ${wait}초`;
    }
  }, 1000);
}

// ==========================================
// 🚨 파이썬(키오스크) 데이터 낚아채기 및 초기 세팅
// ==========================================
window.addEventListener('DOMContentLoaded', function() {
    const urlParams = new URLSearchParams(window.location.search);
    const urlUserId = urlParams.get('user_id');
    const urlToken = urlParams.get('token');
    const urlSongs = urlParams.get('songs');

    if (urlSongs) {
        localStorage.setItem("user_id", urlUserId);
        localStorage.setItem("access_token", urlToken);
        localStorage.setItem("remain_songs", urlSongs);
        window.history.replaceState({}, document.title, window.location.pathname);
    }

    const currentUserId = localStorage.getItem("user_id") || "Guest";
    const currentSongs = localStorage.getItem("remain_songs") || "0";

    document.getElementById("display-user").innerText = currentUserId;
    document.getElementById("display-songs").innerText = currentSongs;

    if (parseInt(currentSongs) <= 0) {
        alert("결제된 곡이 없습니다. 키오스크에서 결제 후 입장해주세요!");
    } else {
        console.log(`[부스 입장 완료] ${currentUserId}님, ${currentSongs}곡 남았습니다.`);
    }

    // 🚨 화면이 켜지자마자 노래 목록 불러오기
    filterSongs();
});
</script>
</body>
</html>
